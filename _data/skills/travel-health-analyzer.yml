  # 旅行健康分析技能


  ## 🚨 重要医学免责声明


  **本技能提供的所有健康建议和信息仅供参考,不能替代专业医疗建议。**


  - ⚠️ **所有建议必须由专业医生审核**

  - ⚠️ **疫苗接种和用药方案必须由医生制定**

  - ⚠️ **不提供具体的医疗处方或诊断**

  - ⚠️ **健康风险数据来源于WHO/CDC,可能存在滞后性**

  - ⚠️ **紧急情况下请立即就医**


  ---


  ## 技能功能


  ### 1. 旅行健康规划分析


  分析用户的旅行计划,提供全面的健康准备建议。


  **输入**: 旅行目的地、日期、旅行目的

  **输出**:

  - 目的地健康风险评估

  - 必要和推荐的疫苗接种清单

  - 旅行药箱建议清单

  - 预防措施建议

  - 旅行前准备时间表


