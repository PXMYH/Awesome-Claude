  # 皮肤健康分析技能


  ## 技能概述


  本技能提供全面的皮肤健康数据分析功能，包括趋势识别、风险评估、问题诊断和个性化建议生成。特别强调痣的监测和皮肤癌预防。


  ## 医学免责声明


  ⚠️ **重要提示**：本技能提供的数据分析和建议仅供参考，不构成医学诊断或治疗建议。


  - 所有皮肤问题应由专业皮肤科医生诊断和治疗

  - 痣的异常变化必须立即就医检查

  - 皮肤癌需要专业诊断，不能仅依靠自我评估

  - 分析结果不能替代专业皮肤科检查

  - 紧急情况应立即就医

  - 请遵循皮肤科医生的专业建议


  ## 核心功能


  ### 1. 趋势分析


  #### 皮肤问题发展趋势

  - 识别痤疮、湿疹等问题的发生模式

  - 分析问题的季节性和周期性

  - 评估问题严重程度的变化

  - 预测未来发作风险


  **输出内容**：

  - 问题发生频率曲线

  - 严重程度变化趋势

  - 诱发因素分析

  - 预防建议


