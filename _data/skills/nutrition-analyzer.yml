  allowed-tools: Read, Grep, Glob, Write\n---\n\n# 营养分析器技能\n\n分析饮食和营养数据，识别营养模式，评估营养状况，并提供个性化营养改善建议。\n\
  \n## 功能\n\n### 1. 营养趋势分析\n\n分析营养素摄入的变化趋势，识别改善或需要关注的方面。\n\n**分析维度**：\n- 宏量营养素趋势（蛋白质、碳水、脂肪、纤维、卡路里）\n\
  - 微量营养素趋势（维生素、矿物质）\n- 热量来源分布变化\n- 餐食模式（饮食时间、频率）\n- 食物类别偏好\n\n**输出**：\n- 趋势方向（改善/稳定/下降）\n\
  - 变化幅度和百分比\n- 趋势显著性\n- 改进建议\n\n### 2. 营养素摄入评估\n\n评估营养素摄入是否达到推荐标准（RDA/AI）。\n\n**评估内容**：\n\
  - **宏量营养素评估**：\n  - 蛋白质摄入量和质量\n  - 碳水化合物类型分布（精制 vs 复杂碳水）\n  - 脂肪类型..."
