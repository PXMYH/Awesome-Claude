  # 紧急医疗信息卡生成器


  生成紧急情况下快速访问的医疗信息摘要，用于急救或就医。


  ## 核心功能


  ### 1. 紧急信息提取

  从用户的健康数据中提取最关键的信息：

  - **严重过敏**：优先提取4级（过敏性休克）和3级过敏

  - **当前用药**：活跃药物的名称、剂量、频率

  - **急症情况**：需要紧急处理的医疗状况

  - **植入物**：心脏起搏器、支架等（影响检查和治疗）

  - **紧急联系人**：快速联系的家属信息


  ### 2. 信息优先级排序

  按照医疗紧急程度对信息排序：

  1. **P0 - 危急信息**：过敏性休克、严重药物过敏、危及生命的疾病

  2. **P1 - 重要信息**：当前用药、慢性病、植入物

  3. **P2 - 一般信息**：血型、年龄、...'
