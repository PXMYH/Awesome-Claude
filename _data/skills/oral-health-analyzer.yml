  # 口腔健康分析技能


  ## 技能概述


  本技能提供全面的口腔健康数据分析功能，包括趋势识别、风险评估、问题诊断和个性化建议生成。


  ## 医学免责声明


  ⚠️ **重要提示**：本技能提供的数据分析和建议仅供参考，不构成医学诊断或治疗建议。


  - 所有口腔问题应由专业牙科医生诊断和治疗

  - 分析结果不能替代专业口腔检查

  - 紧急情况应立即就医

  - 请遵循牙科医生的专业建议


  ## 核心功能


  ### 1. 趋势分析


  #### 龋齿发展趋势

  - 识别龋齿发生的模式和频率

  - 分析龋齿在不同牙位的分布

  - 评估龋齿发展速度

  - 预测未来龋齿风险


  **输出内容**：

  - 龋齿数量变化曲线

  - 高风险牙位识别

  - 发展趋势预测

  - 预防建议


  #### 牙周健康变化

  - 牙周出血频率统计

  - 牙周袋深度变化

  - 附着丧失监测

  - 牙龈退缩进展


  **输出内容**：

  - 牙周健康评分趋势

  - 疾病进展预警

  - 治疗效果...'
